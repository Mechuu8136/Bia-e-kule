version: '3.8'
services:
 web:
 build: .
 ports:
 - "8080:3000"
 volumes:
 - .:/app
 - /app/node_modules
 command: npm run dev
 depends_on:
 - db
 db:
 image: postgres:15-alpine
 environment:
 POSTGRES_USER: admin
 POSTGRES_PASSWORD: secretpassword
 POSTGRES_DB: lab_database
 ports:
 - "5432:5432"
 volumes:
 - pg-data:/var/lib/postgresql/data
volumes:
 pg-data:
